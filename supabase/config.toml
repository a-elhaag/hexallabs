# Supabase project config. `supabase init` normally generates this — hand-written here so
# `supabase db reset` / `supabase start` know the project id. All values safe to commit.

project_id = "hexal-lm"

[db]
port = 54322
major_version = 17

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
